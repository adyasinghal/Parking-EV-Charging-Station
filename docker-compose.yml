version: "3.9"

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root_secret
      MARIADB_DATABASE: voltpark
      MARIADB_USER: voltpark
      MARIADB_PASSWORD: voltpark_secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: voltpark
      DB_PASSWORD: voltpark_secret
      DB_NAME: voltpark
      JWT_SECRET: change-me-in-production
      JWT_TOKEN_TTL_HOURS: 24
      USE_DB_PROCEDURES: "true"
      PORT: 8080
      APP_ENV: production
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  db_data:

